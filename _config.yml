      path: ""
      type: projects
    values:
      layout: project

nav:
  - title: "Home"
    url: "/"
  - title: "Projects"
    url: "/projects/"
  - title: "Publications"
    url: "/publications/"
  - title: "CV"
    url: "/cv/"

author:
