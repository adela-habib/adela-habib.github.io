# GitHub Pages-compatible theme (we'll use our own layouts, but minima provides sane defaults)
theme: minima

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

markdown: kramdown

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
