<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}" />

    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>
    <div class="bg"></div>

    <header class="header">
      <div class="container header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-dot"></span>
          <span class="brand-text">{{ site.title }}</span>
        </a>

        <nav class="nav">
          <a href="{{ '/' | relative_url }}" class="nav-link">Home</a>
          <a href="{{ '/projects/' | relative_url }}" class="nav-link">Projects</a>
          <a href="{{ '/publications/' | relative_url }}" class="nav-link">Publications</a>
          <a href="{{ '/about/' | relative_url }}" class="nav-link">About</a>
        </nav>
      </div>
    </header>

    <main class="container main">
      {{ content }}
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <div>
          <div class="footer-title">Connect</div>
          <div class="icon-row">
            <a aria-label="LinkedIn" class="icon" href="{{ site.social.linkedin }}"><i class="fa-brands fa-linkedin"></i></a>
            <a aria-label="GitHub" class="icon" href="{{ site.social.github }}"><i class="fa-brands fa-github"></i></a>
            <a aria-label="Google Scholar" class="icon" href="{{ site.social.scholar }}"><i class="fa-solid fa-graduation-cap"></i></a>
          </div>
        </div>
        <div class="muted">© {{ "now" | date: "%Y" }} {{ site.title }} · Built with Jekyll</div>
      </div>
    </footer>
  </body>
</html>
