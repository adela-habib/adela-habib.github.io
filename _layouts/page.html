---
layout: default
---

<article>
  <header style="margin: 18px 0 14px;">
    <h1 style="margin: 0;">{{ page.title }}</h1>
    {% if page.subtitle %}<p style="margin: 10px 0 0; color: var(--muted);">{{ page.subtitle }}</p>{% endif %}
  </header>

  <div class="card">
    {{ content }}
  </div>
</article>
